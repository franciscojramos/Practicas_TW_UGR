<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Blog Personal - Contacta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="pagina-contacto">
    <header class="encabezado-blog text-center py-3 px-2">
        <h1 class="titulo-blog h2 mb-1">Francisco Ramos Blog</h1>
        <p class="subtitulo-blog mb-0 small">Tecnología, Ingeniería y Negocios</p>
    </header>

    <nav class="navbar navbar-expand-md navbar-dark barra-navegacion">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu-principal" aria-controls="menu-principal" aria-expanded="false" aria-label="Mostrar u ocultar menú">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu-principal">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Principal</a></li>
                    <li class="nav-item"><a class="nav-link" href="sobremi.html">Sobre mí</a></li>
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="contacta.html">Contacta</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <h1>Contacta</h1>

        <form class="formulario-contacto" action="/contacto/" method="post">
            <div class="row g-3 mb-1">
                <div class="col-12 col-md-6">
                    <div class="form-floating">
                        <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Nombre" required>
                        <label for="nombre">Nombre</label>
                    </div>
                </div>
                <div class="col-12 col-md-6">
                    <div class="form-floating">
                        <input type="text" class="form-control" id="apellidos" name="apellidos" placeholder="Apellidos" required>
                        <label for="apellidos">Apellidos</label>
                    </div>
                </div>
            </div>

            <div class="row g-3 mb-1">
                <div class="col-12 col-md-6">
                    <div class="form-floating">
                        <input
                            type="email"
                            class="form-control"
                            id="email"
                            name="email"
                            placeholder="correo@ejemplo.com"
                            pattern="[a-z0-9.\-]+@[a-z0-9.\-]+"
                            required
                        >
                        <label for="email">Email</label>
                    </div>
                </div>
                <div class="col-12 col-md-6">
                    <div class="form-floating">
                        <select class="form-select" id="pokemon" name="pokemon" aria-label="Pokémon preferido" required>
                            <option value="" selected disabled>Elegir Pokémon</option>
                            <option value="treecko">Treecko</option>
                            <option value="torchic">Torchic</option>
                            <option value="mudkip">Mudkip</option>
                            <option value="kyogre">Kyogre</option>
                            <option value="groudon">Groudon</option>
                            <option value="rayquaza">Rayquaza</option>
                            <option value="turtwig">Turtwig</option>
                            <option value="chimchar">Chimchar</option>
                            <option value="piplup">Piplup</option>
                            <option value="dialga">Dialga</option>
                            <option value="giratina">Giratina</option>
                            <option value="palkia">Palkia</option>
                            <option value="otro">Otro (no tengo buen gusto sobre Pokémon)</option>
                        </select>
                        <label for="pokemon">Pokémon preferido</label>
                    </div>
                </div>
            </div>

            <div class="form-floating mb-3">
                <textarea class="form-control" id="comentario" name="comentario" placeholder="Comentario" style="height: 7rem"></textarea>
                <label for="comentario">Comentario (opcional)</label>
            </div>

            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="newsletter" name="newsletter" value="1">
                <label class="form-check-label" for="newsletter">Quiero darme de alta para recibir noticias por correo</label>
            </div>

            <div class="d-grid gap-2 d-sm-flex justify-content-sm-start flex-wrap">
                <button class="btn btn-primary px-4" type="submit">Enviando</button>
                <button class="btn btn-dark px-4" type="reset">Limpiar</button>
            </div>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Francisco José Ramos Moya.</p>
        <p>Este blog es un proyecto para la asignatura de <strong>Tecnologías Web en la Universidad de Granada </strong></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
